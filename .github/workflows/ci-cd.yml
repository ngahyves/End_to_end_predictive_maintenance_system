name: MLOps_Pipeline_CI_CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # --- STAGE 1: Unit & Integration Tests ---
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests with Pytest
        run: |
          python -m pytest

  # --- STAGE 2: Build & Package (Docker) ---
  # This job only runs if the 'test' job succeeds
  build-docker:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' # Only build on real pushes to main
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: uses/docker/setup-buildx-action@v2

      - name: Build Local Image
        run: |
          docker build -t maintenance-api -f deployment/Dockerfile .
        # Note: Later we will add the "Push to GCP" step here